spring.application.name=proyecto-avanzada

# ?? Base de datos H2 ????????????????????????????????????????????????????????
spring.datasource.url=jdbc:h2:mem:solicitudesdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# ?? Consola H2 (solo desarrollo) ????????????????????????????????????????????
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
spring.h2.console.settings.web-allow-others=false

# ?? JPA / Hibernate ?????????????????????????????????????????????????????????
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# ?? JWT ?????????????????????????????????????????????????????????????????????
jwt.expiry=5
jwt.secret=MiClaveSecretaSuperSeguraParaJWT2026EnProgramacionAvanzadaUniquindio

# ?? Seed Data ???????????????????????????????????????????????????????????????
default-users.users[0].username=admin@solicitudes.com
default-users.users[0].password=admin123
default-users.users[0].role=ADMIN
default-users.users[1].username=agente@solicitudes.com
default-users.users[1].password=agente123
default-users.users[1].role=USER

# ?? Swagger UI ??????????????????????????????????????????????????????????????
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.try-it-out-enabled=true

# ?? Logging (opcional, ˙til para depurar seguridad) ?????????????????????????
logging.level.org.springframework.security=DEBUG
logging.level.co.edu.uniquindio=DEBUG
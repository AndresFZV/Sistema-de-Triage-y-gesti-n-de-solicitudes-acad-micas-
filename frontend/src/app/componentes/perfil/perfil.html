<div class="container mt-4">
  <div class="row justify-content-center">
    <div class="col-md-6">

      @if (cargando()) {
        <div class="text-center py-5">
          <div class="spinner-border text-primary"></div>
        </div>
      }

      @if (usuario()) {
        <div class="card shadow-sm">
          <div class="card-header d-flex justify-content-between align-items-center">
            <h5 class="mb-0">
              <i class="fa-solid fa-circle-user me-2"></i>Mi Perfil
            </h5>
            @if (!editando()) {
              <button class="btn btn-outline-primary btn-sm" (click)="editando.set(true)">
                <i class="fa-solid fa-pen me-1"></i>Editar
              </button>
            }
          </div>
          <div class="card-body">
            @if (!editando()) {
              <div class="mb-3">
                <label class="text-muted small">Nombre</label>
                <p class="fw-semibold mb-0">{{ usuario().nombre }}</p>
              </div>
              <div class="mb-3">
                <label class="text-muted small">Email</label>
                <p class="fw-semibold mb-0">{{ usuario().email }}</p>
              </div>
              <div class="mb-3">
                <label class="text-muted small">Tipo de usuario</label>
                <p class="fw-semibold mb-0">{{ usuario().tipoUsuario }}</p>
              </div>
            } @else {
              <div class="mb-3">
                <label class="form-label">Nombre</label>
                <input type="text" class="form-control"
                  [(ngModel)]="formulario.nombre" />
              </div>
              <div class="mb-3">
                <label class="form-label">Email</label>
                <input type="email" class="form-control"
                  [(ngModel)]="formulario.email" />
              </div>
              <div class="mb-3">
                <label class="form-label">Tipo de usuario</label>
                <input type="text" class="form-control"
                  [value]="formulario.tipoUsuario" disabled />
              </div>
              <div class="d-flex gap-2">
                <button class="btn btn-primary" (click)="guardar()">
                  <i class="fa-solid fa-save me-1"></i>Guardar
                </button>
                <button class="btn btn-outline-secondary" (click)="cancelarEdicion()">
                  Cancelar
                </button>
              </div>
            }
          </div>
        </div>
      }
    </div>
  </div>
</div>

<div class="registro-container">
  <div class="registro-card">
    <h2>Sistema de Triage Académico</h2>
    <h3>Crear Cuenta</h3>

    @if (error) {
      <div class="error">{{ error }}</div>
    }

    @if (exito) {
      <div class="exito">{{ exito }}</div>
    }

    <form (ngSubmit)="registrar()">
      <div class="form-group">
        <label for="nombre">Nombre completo</label>
        <input
          id="nombre"
          type="text"
          [(ngModel)]="request.nombre"
          name="nombre"
          placeholder="Juan Pérez"
          required
        />
      </div>

      <div class="form-group">
        <label for="email">Email</label>
        <input
          id="email"
          type="email"
          [(ngModel)]="request.email"
          name="email"
          placeholder="juan@uniquindio.edu.co"
          required
        />
      </div>

      <div class="form-group">
        <label for="password">Contraseña</label>
        <input
          id="password"
          type="password"
          [(ngModel)]="request.password"
          name="password"
          placeholder="Mínimo 8 caracteres"
          required
        />
      </div>

      <button type="submit" [disabled]="cargando">
        {{ cargando ? 'Registrando...' : 'Registrarse' }}
      </button>
    </form>

    <p class="login-link">
      ¿Ya tienes cuenta? <a routerLink="/login">Inicia sesión aquí</a>
    </p>
  </div>
</div>
